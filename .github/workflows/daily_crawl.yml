name: 텐배거 일별 데이터 수집

on:
  schedule:
    - cron: "0 23 * * 0-4"   # 한국시간 오전 8시 (UTC 23:00, 월~금)
  workflow_dispatch:           # 수동 실행 허용

permissions:
  contents: write              # CSV 커밋 권한

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 데이터 수집
        run: |
          python collect.py \
            --min-cap 500 \
            --workers 6 \
            --output data/scores.csv
        env:
          PYTHONUNBUFFERED: "1"

      - name: CSV 커밋 및 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scores.csv
          git diff --cached --quiet || \
            git commit -m "data: 텐배거 스코어 업데이트 $(date +'%Y-%m-%d %H:%M KST' -d '+9 hours')"
          git push
